name: Create Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          VERSION="${TAG#v}"
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "JProfiler MCP server $VERSION" \
            --notes "JProfiler MCP server $VERSION"
